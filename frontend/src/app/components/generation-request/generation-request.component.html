<section class="generation-panel">
  <div class="panel-header">
    <div>
      <p class="eyebrow">AI generation</p>
      <h2>Generate a study question from a topic</h2>
    </div>
    <button type="button" class="button button-ghost" (click)="closeForm.emit()">Close</button>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="generation-form">
    <label>
      <span>Topic</span>
      <input type="text" formControlName="topic" placeholder="ngOnInit" />
    </label>

    <label>
      <span>Category</span>
      <input type="text" formControlName="category" placeholder="frontend" />
    </label>

    <label>
      <span>Difficulty</span>
      <select formControlName="difficulty">
        @for (difficulty of difficulties; track difficulty) {
          <option [value]="difficulty">{{ difficulty }}</option>
        }
      </select>
    </label>

    <button type="submit" class="button button-primary" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Generating question...' : 'Generate Question' }}
    </button>
  </form>

  <p class="generation-panel__hint">
    This creates a question directly in the bank. If Codex is unavailable, the backend will still create a usable study question instead of leaving the request hanging.
  </p>

  @if (message()) {
    <p class="success-message">{{ message() }}</p>
  }

  @if (error()) {
    <p class="error-message">{{ error() }}</p>
  }
</section>
