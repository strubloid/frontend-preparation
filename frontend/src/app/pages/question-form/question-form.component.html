<section class="form-card">
  <a class="back-link" [routerLink]="question() ? ['/questions', question()?.id] : ['/']">← Back</a>
  <h1>{{ isEditMode() ? 'Edit Question' : 'Create Question' }}</h1>

  <p *ngIf="isLoading()">Loading question...</p>
  <p *ngIf="error()" class="error-message">{{ error() }}</p>

  <form *ngIf="!isLoading()" [formGroup]="form" (ngSubmit)="save()">
    <label>
      Title
      <input type="text" formControlName="title" />
      <span *ngIf="form.controls.title.touched && form.controls.title.invalid">Title is required.</span>
    </label>

    <label>
      Question
      <textarea rows="7" formControlName="question"></textarea>
      <span *ngIf="form.controls.question.touched && form.controls.question.invalid">Question is required.</span>
    </label>

    <label>
      Answer
      <textarea rows="7" formControlName="answer"></textarea>
      <span *ngIf="form.controls.answer.touched && form.controls.answer.invalid">Answer is required.</span>
    </label>

    <label>
      Category
      <input type="text" formControlName="category" placeholder="frontend" />
    </label>

    <label>
      Difficulty
      <select formControlName="difficulty">
        <option *ngFor="let difficulty of difficulties" [value]="difficulty">{{ difficulty }}</option>
      </select>
      <span *ngIf="form.controls.difficulty.touched && form.controls.difficulty.invalid">Difficulty is required.</span>
    </label>

    <div class="actions">
      <button type="submit" class="button primary" [disabled]="isSaving()">
        {{ isEditMode() ? 'Save Changes' : 'Save' }}
      </button>
      <button type="button" class="button ghost" (click)="cancel()">Cancel</button>
      <button *ngIf="isEditMode()" type="button" class="button danger" (click)="deleteQuestion()">Delete Question</button>
    </div>
  </form>
</section>
