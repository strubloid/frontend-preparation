<section class="generation-panel">
  <div class="panel-header">
    <div>
      <p class="eyebrow">Generation request</p>
      <h2>Queue a new study prompt</h2>
    </div>
    <button type="button" class="button button-ghost" (click)="closeForm.emit()">Close</button>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="generation-form">
    <label>
      <span>Topic</span>
      <input type="text" formControlName="topic" placeholder="Angular components" />
    </label>

    <label>
      <span>Category</span>
      <input type="text" formControlName="category" placeholder="frontend" />
    </label>

    <label>
      <span>Difficulty</span>
      <select formControlName="difficulty">
        <option *ngFor="let difficulty of difficulties" [value]="difficulty">{{ difficulty }}</option>
      </select>
    </label>

    <button type="submit" class="button button-primary" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Saving...' : 'Create Generation Request' }}
    </button>
  </form>

  <p *ngIf="message" class="success-message">{{ message }}</p>
  <p *ngIf="error" class="error-message">{{ error }}</p>
</section>
