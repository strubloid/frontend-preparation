# fly.toml app configuration file generated for frontend-preparation on 2026-05-27T16:55:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'frontend-preparation'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
